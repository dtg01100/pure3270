vectors:
  - id: err-connection-reset
    description: "Connection reset during read should raise ConnectionResetError"
    tags: [error, connection]
    server_sends:
      - raises: ConnectionResetError
    expected_client_writes: []
    assert_error: ConnectionResetError

  - id: err-read-timeout
    description: "Read timeout should raise asyncio.TimeoutError"
    tags: [error, timeout]
    server_sends:
      - raises: asyncio.TimeoutError
    expected_client_writes: []
    assert_error: TimeoutError

  - id: err-malformed-iac
    description: "IAC followed by non-command byte (0x00) should skip to next sync point"
    tags: [error, protocol]
    server_sends:
      - b: "ff0048656c6c6f"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: err-truncated-sb
    description: "SB without closing SE should eventually timeout or be handled"
    tags: [error, protocol]
    server_sends:
      - b: "fffa2801"
    expected_client_writes: []
    assert_error: None

  - id: err-garbage-input
    description: "Complete garbage bytes fed to handler should not crash"
    tags: [error, fuzz]
    server_sends:
      - b: "deadbeef010203040506070809"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: err-partial-telnet-sequence
    description: "Partial IAC sequence split across reads should reassemble correctly"
    tags: [error, protocol, segmentation]
    server_sends:
      - b: "ff"
      - b: "fb28"
    expected_client_writes:
      - contains: "fffd28"
    assert_state: NEGOTIATING

  - id: err-buffer-overflow-attempt
    description: "Excessive data in single buffer should not cause overflow"
    tags: [error, buffer]
    server_sends:
      - b: "ffffff"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: err-null-bytes
    description: "Server sends null bytes, handler should not crash"
    tags: [error, protocol]
    server_sends:
      - b: "000000"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: err-iac-se-in-wrong-place
    description: "IAC SE (0xf0) appearing outside subnegotiation should be handled"
    tags: [error, protocol]
    server_sends:
      - b: "fff0"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: err-all-zeros
    description: "All zero bytes should be handled gracefully"
    tags: [error, fuzz]
    server_sends:
      - b: "00000000000000000000"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: err-all-ones
    description: "All 0xFF bytes should be handled gracefully"
    tags: [error, fuzz]
    server_sends:
      - b: "ffffffffffffffffffff"
    expected_client_writes: []
    assert_state: NEGOTIATING
