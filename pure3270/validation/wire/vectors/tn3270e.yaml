vectors:
  - id: tn3270e-header-encode
    description: "TN3270E 5-byte header with TN3270_DATA type, seq=1"
    tags: [rfc2355, header]
    server_sends: []
    expected_client_writes: []
    assert_encoding:
      data_type: 0
      request_flag: 0
      response_flag: 0
      seq_number: 1
      expected_hex: "0000000001"

  - id: tn3270e-header-scs-data
    description: "TN3270E header with SCS_DATA type (0x01)"
    tags: [rfc2355, header]
    server_sends: []
    expected_client_writes: []
    assert_encoding:
      data_type: 1
      request_flag: 0
      response_flag: 1
      seq_number: 5
      expected_hex: "0100010005"

  - id: tn3270e-header-bind-image
    description: "TN3270E header with BIND_IMAGE type (0x03)"
    tags: [rfc2355, header, bind]
    server_sends: []
    expected_client_writes: []
    assert_encoding:
      data_type: 3
      request_flag: 1
      response_flag: 0
      seq_number: 32767
      expected_hex: "0301007fff"

  - id: tn3270e-data-stream-ctl
    description: "DATA-STREAM-CTL active: handler prepends TN3270E header to outgoing data"
    tags: [rfc2355, data-stream-ctl]
    use_data_stream_ctl: true
    client_sends:
      data: "c1c2c3"
    expected_client_writes:
      - exact: "0000000001c1c2c3"
    assert_state: TN3270_MODE

  - id: tn3270e-receive-tn3270-data
    description: "Receive TN3270_DATA with valid 5-byte header"
    tags: [rfc2355, receive]
    server_sends:
      - b: "000000000140c1c2c3"
    expected_client_writes: []
    assert_state: TN3270_MODE

  - id: tn3270e-receive-scs-data
    description: "Receive SCS_DATA with valid 5-byte header"
    tags: [rfc2355, receive, scs]
    server_sends:
      - b: "010000000104f1f2f3f4"
    expected_client_writes: []
    assert_state: TN3270_MODE

  - id: tn3270e-invalid-data-type
    description: "Receive header with invalid data type (0xFF), current handler silently treats as non-TN3270E data"
    tags: [rfc2355, error]
    server_sends:
      - b: "ff00000001c1c2c3"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: tn3270e-truncated-header
    description: "Receive truncated header (3 bytes instead of 5), should handle gracefully"
    tags: [rfc2355, error]
    server_sends:
      - b: "000001"
    expected_client_writes: []
    assert_error: None

  - id: tn3270e-device-type-connect
    description: "Server sends DEVICE-TYPE CONNECT, client responds with IS + lu_name"
    tags: [rfc2355, device-type, connect]
    server_sends:
      - b: "fffa280201f0"
    expected_client_writes:
      - pattern: "fffa28"
    assert_state: NEGOTIATING

  - id: tn3270e-device-type-associate
    description: "Server sends DEVICE-TYPE ASSOCIATE with LU name, client responds"
    tags: [rfc2355, device-type, associate]
    server_sends:
      - b: "fffa2802035444433031373032f0"
    expected_client_writes:
      - pattern: "fffa28"
    assert_state: NEGOTIATING

  - id: tn3270e-device-type-reject
    description: "Server sends DEVICE-TYPE REJECT, client handles rejection"
    tags: [rfc2355, device-type, reject]
    server_sends:
      - b: "fffa280205f0"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: tn3270e-nvt-data
    description: "Receive NVT-DATA data type (0x05) in TN3270E header"
    tags: [rfc2355, nvt, receive]
    server_sends:
      - b: "050000000048656c6c6f"
    expected_client_writes: []
    assert_state: NEGOTIATING

  - id: tn3270e-response-data
    description: "Receive RESPONSE data type (0x02)"
    tags: [rfc2355, response]
    server_sends:
      - b: "0200000001"
    expected_client_writes: []
    assert_state: TN3270_MODE

  - id: tn3270e-unbind
    description: "Receive UNBIND data type (0x04)"
    tags: [rfc2355, unbind]
    server_sends:
      - b: "0400000001"
    expected_client_writes: []
    assert_state: TN3270_MODE

  - id: tn3270e-sscp-lu-data
    description: "Receive SSCP-LU-DATA data type (0x07)"
    tags: [rfc2355, sscp-lu]
    server_sends:
      - b: "0700000001"
    expected_client_writes: []
    assert_state: TN3270_MODE

  - id: tn3270e-print-eoj
    description: "Receive PRINT-EOJ data type (0x08)"
    tags: [rfc2355, printer]
    server_sends:
      - b: "0800000001"
    expected_client_writes: []
    assert_state: TN3270_MODE

  - id: tn3270e-seq-wrap
    description: "TN3270E sequence number wraps at 32767"
    tags: [rfc2355, header, sequence]
    server_sends: []
    expected_client_writes: []
    assert_encoding:
      data_type: 0
      request_flag: 0
      response_flag: 0
      seq_number: 32768
      expected_hex: "00000000008000"
