name: Trace Replay & Regression Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  trace-replay:
    name: Trace Replay & Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Prepare output directory
        run: mkdir -p test_output

      - name: Validate trace files
        run: |
          echo "🔍 Validating trace files before running tests..."
          python -c "
          import os
          import sys
          from pathlib import Path

          trace_dir = Path('tests/data/traces')
          if not trace_dir.exists():
              print('Trace directory not found:', trace_dir)
              sys.exit(1)

          trace_files = list(trace_dir.glob('*.trc'))
          if not trace_files:
              print('No trace files found in', trace_dir)
              sys.exit(1)

          print('Found', len(trace_files), 'trace files:')
          for tf in trace_files:
              size = tf.stat().st_size
              print('  -', tf.name, '(', size, 'bytes)')
              if size == 0:
                  print('Empty trace file:', tf)
                  sys.exit(1)

          print('All trace files validated successfully')
          "

      - name: Run regression trace suite (parametrized)
        run: |
          echo "🧪 Running parametrized regression trace suite..."
          python -m pytest tests/test_regression_traces.py \
            --junitxml=test_output/regression_traces_junit.xml \
            --tb=short \
            -v \
            -m "slow" \
            --no-header \
            || echo "::warning::Regression trace suite reported xfails/failures - see XML"
        continue-on-error: true

      - name: Generate JSON regression report
        run: |
          echo "📊 Generating JSON regression report..."
          python tools/run_regression_traces.py \
            --report-json test_output/regression_traces_report.json \
            --strict \
            || echo "::warning::Strict mode reported failures - see report"
        continue-on-error: true

      - name: Run enhanced trace replay on key traces
        run: |
          echo "🔄 Running enhanced trace replay and generating JSON reports..."
          mkdir -p test_output
          set +e
          for trace_file in tests/data/traces/login.trc tests/data/traces/smoke.trc; do
            expected_file="tests/data/expected/$(basename "$trace_file" .trc)_expected.json"
            output_file="test_output/$(basename "$trace_file" .trc)_trace_report.json"
            echo "▶️  Replaying $(basename "$trace_file") with expectations $(basename "$expected_file")"
            # Do not fail the job on mismatch; produce report for inspection
            if PYTHONPATH="${PYTHONPATH}:$(pwd)" python tools/enhanced_trace_replay.py "$trace_file" --expected "$expected_file" --json > "$output_file" 2>&1; then
              echo "✅ Trace replay successful for $(basename "$trace_file")"
            else
              echo "⚠️  Trace replay reported issues for $(basename "$trace_file"); see $output_file"
            fi
          done

      - name: Summarize regression results
        if: always()
        run: |
          python tools/render_regression_summary.py \
            test_output/regression_traces_report.json

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trace-replay-test-output-${{ matrix.python-version }}
          path: |
            test_output/regression_traces_junit.xml
            test_output/regression_traces_report.json
            test_output/*_trace_report.json
