name: Nightly s3270 Parity Check

on:
  schedule:
    # 02:00 UTC every day. Off-peak for the project's typical contributors.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      base_port:
        description: "Base port for replay servers"
        required: false
        default: "23400"
        type: string
      delay:
        description: "Seconds to wait for screen capture"
        required: false
        default: "1.0"
        type: string

permissions:
  contents: read
  issues: write

jobs:
  parity:
    name: s3270 Parity & Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libssl-dev libx11-dev x11proto-core-dev \
            libncurses5-dev net-tools ca-certificates

      - name: Build s3270 from source
        id: build_s3270
        run: |
          set -e
          cd /tmp
          curl -fsSL "https://x3270.bgp.nu/download/snapshots/x3270-4.5ga5-src.tgz" \
            -o x3270-src.tgz || \
            curl -fsSL "https://x3270.bgp.nu/download/4.5/x3270-4.5ga5-src.tgz" \
              -o x3270-src.tgz
          tar -xzf x3270-src.tgz
          cd x3270-4.5*
          ./configure --prefix=/usr/local
          make -j"$(nproc)"
          sudo make install
          /usr/local/bin/s3270 -V || true
        continue-on-error: true

      - name: Locate s3270 binary
        id: s3270_path
        run: |
          if command -v s3270 >/dev/null 2>&1; then
            echo "path=$(command -v s3270)" >> $GITHUB_OUTPUT
          elif [ -x /usr/local/bin/s3270 ]; then
            echo "path=/usr/local/bin/s3270" >> $GITHUB_OUTPUT
          else
            echo "path=" >> $GITHUB_OUTPUT
            echo "::warning::s3270 binary not available; pure3270-only comparison"
          fi

      - name: Prepare output directory
        run: mkdir -p test_output

      - name: Run regression trace suite
        run: |
          echo "🧪 Running parametrized regression trace suite..."
          python -m pytest tests/test_regression_traces.py \
            --junitxml=test_output/regression_traces_junit.xml \
            --tb=line \
            -m "slow" \
            --no-header \
            || echo "::warning::Regression trace suite reported xfails - see XML"
        continue-on-error: true

      - name: Generate JSON regression report
        run: |
          echo "📊 Generating JSON regression report..."
          python tools/run_regression_traces.py \
            --report-json test_output/regression_traces_report.json \
            --strict \
            || echo "::warning::Strict regression mode reported failures"

      - name: Run s3270 parity check
        run: |
          echo "🔍 Running pure3270-vs-s3270 parity check..."
          S3270_PATH="${{ steps.s3270_path.outputs.path }}"
          if [ -z "$S3270_PATH" ]; then
            python tools/run_s3270_parity.py \
              --report-json test_output/s3270_parity_report.json \
              || echo "::warning::Parity check reported issues"
          else
            python tools/run_s3270_parity.py \
              --s3270-path "$S3270_PATH" \
              --report-json test_output/s3270_parity_report.json \
              || echo "::warning::Parity check reported issues"
          fi
        continue-on-error: true

      - name: Compare with previous nightly run
        if: always()
        run: |
          echo "📈 Diffing parity report against previous successful run..."
          python tools/diff_parity_reports.py \
            --current test_output/s3270_parity_report.json \
            --history test_output/parity_history.json \
            --output test_output/parity_diff.json \
            || echo "::warning::Parity diff step reported issues"
        continue-on-error: true

      - name: Render step summary
        if: always()
        run: |
          python tools/render_regression_summary.py \
            test_output/regression_traces_report.json
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test_output/s3270_parity_report.json ]; then
            echo "## s3270 Parity Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          with open('test_output/s3270_parity_report.json') as f:
              data = json.load(f)
          s = data.get('summary', {})
          print('| Metric | Value |')
          print('|--------|-------|')
          print(f\"| Total | {s.get('total', 0)} |\")
          print(f\"| Matched | {s.get('matched', 0)} |\")
          print(f\"| Mismatched | {s.get('mismatched', 0)} |\")
          print(f\"| Skipped | {s.get('skipped', 0)} |\")
          print(f\"| Errors | {s.get('errors', 0)} |\")
          print(f\"| s3270 | {data.get('s3270_path', 'not found')} |\")
          mismatched = [r for r in data.get('results', []) if r.get('parity') is False]
          if mismatched:
              print('')
              print('### Mismatched traces')
              for r in mismatched:
                  print(f\"- \`{r['trace']}\`: {len(r.get('diff', []))} diff lines\")
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-parity-${{ github.run_id }}
          path: |
            test_output/regression_traces_junit.xml
            test_output/regression_traces_report.json
            test_output/s3270_parity_report.json
            test_output/parity_diff.json
          retention-days: 30

      - name: Archive parity snapshot
        if: success() || failure()
        run: |
          # Store this run's parity snapshot for diffing on the next run.
          # We keep a single rolling snapshot (the workflow retains full
          # history via the uploaded artifact for 30 days).
          if [ -f test_output/s3270_parity_report.json ]; then
            cp test_output/s3270_parity_report.json \
              test_output/parity_history.json
            echo "Snapshot archived for next-run diff."
          fi

      - name: Open regression issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only open an issue if the parity check detected a real regression
          # (i.e. mismatches > matched traces that previously matched).
          python -c "
          import json, os, sys
          try:
              with open('test_output/parity_diff.json') as f:
                  d = json.load(f)
          except Exception:
              d = {}
          if d.get('new_mismatches'):
              print('NEW_REGRESSIONS=' + ','.join(d['new_mismatches']))
              sys.exit(0)
          sys.exit(0)
          " > /tmp/regression_info.txt
          if grep -q NEW_REGRESSIONS= /tmp/regression_info.txt; then
            TRACES=$(cut -d= -f2 /tmp/regression_info.txt)
            BODY="## Automated: s3270 Parity Regression\n\n"
            BODY+="The nightly parity run detected new mismatches against s3270:\n\n"
            BODY+="\`${TRACES}\`\n\n"
            BODY+="Inspect the run artifacts for the unified diff and triage.\n"
            gh issue create \
              --title "🤖 Nightly s3270 parity regression" \
              --body "$BODY" \
              --label "nightly-regression" \
              --label "automated" \
              || echo "::warning::Could not open issue"
          else
            echo "No new regressions detected; no issue opened."
          fi
        continue-on-error: true
